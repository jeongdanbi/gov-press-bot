name: gov-press-bot

on:
  schedule:
    # 매 15분마다 실행 (KST 기준으로는 항상 동일). GitHub Actions는 UTC 기준.
    - cron: "*/15 * * * *"
  workflow_dispatch:   # 수동 실행 가능

# state/seen.json 커밋 권한
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: press-bot
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python -m src.main

      - name: Commit seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet state/seen.json; then
            echo "No changes to seen.json"
          else
            git add state/seen.json
            git commit -m "chore: update seen.json [skip ci]"
            git push
          fi
