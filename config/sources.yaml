# ============================================================
# gov-press-bot - 수집 대상 정의 파일
# ============================================================
#
# 새 기관/URL을 추가하려면 아래 예시 양식대로 sources 리스트에 추가하세요.
# - type: rss              RSS/Atom 피드 (가장 권장)
# - type: korea_kr_dept    korea.kr 부처 RSS (dept_XXX)
# - type: html             HTML 목록 페이지 스크래핑 (파서를 parsers/ 에 구현해야 함)
#
# keywords_include/exclude는 비워두면 전체 수집, 값이 있으면 해당 키워드 필터 적용
# ============================================================

# 공통 HTTP 설정
http:
  user_agent: "Mozilla/5.0 (gov-press-bot; +https://github.com/yourname/gov-press-bot)"
  timeout_sec: 20
  retry: 2

# 다운로드/본문 추출 설정
extract:
  download_pdf: true             # PDF 첨부 다운로드 & 텍스트 추출
  download_hwp: false            # HWP는 파일만 링크, 본문 추출 X (요청사항)
  max_file_size_mb: 30
  max_body_chars: 1500           # Slack 알림에 실릴 요약 본문 최대 글자수

# 수집 대상 목록
sources:
  # ---------- 핵심 6개 기관 (korea.kr 통합 RSS 기반) ----------

  # ─────────────────────────────────────────────
  # 2025년 korea.kr가 RSS(/rss/*.xml)를 전부 폐지(404)함.
  # 살아있는 HTML 목록(pressReleaseList.do)을 스크래핑해서
  # 항목의 부처명(span.source)이 dept_match에 매칭되는 건만 수집한다.
  # list_pages: 최신순 20건/페이지, 훑을 페이지 수 (기본 3 = 최근 60건).
  # ─────────────────────────────────────────────

  - id: fsc
    name: 금융위원회
    emoji: "🏦"
    type: korea_kr_list
    dept_match: ["금융위원회", "금융위"]
    list_pages: 5
    enabled: true
    keywords_include: []
    keywords_exclude: []

  - id: fss_via_all
    name: 금융감독원
    emoji: "🛡️"
    type: korea_kr_list
    # 금감원은 정부부처가 아닌 특수법인이라 korea.kr(정책브리핑)에 게시되지 않음(200건 스캔 0건).
    # 금감원 알림이 필요하면 fss_direct(홈페이지 직접 스크래핑)를 별도로 구현/활성화해야 함.
    dept_match: ["금융감독원", "금감원"]
    list_pages: 5
    enabled: false
    keywords_include: []
    keywords_exclude: []

  - id: bok_via_all
    name: 한국은행
    emoji: "💴"
    type: korea_kr_list
    dept_match: ["한국은행"]
    list_pages: 5
    enabled: false
    keywords_include: []
    keywords_exclude: []

  - id: ftc
    name: 공정거래위원회
    emoji: "⚖️"
    type: korea_kr_list
    dept_match: ["공정거래위원회", "공정위"]
    list_pages: 5
    enabled: true
    keywords_include: []
    keywords_exclude: []

  - id: moef
    name: 재정경제부
    emoji: "🏛️"
    type: korea_kr_list
    # 2025 정부조직 개편: 기획재정부 → 재정경제부(재경부)로 korea.kr 표기 변경됨.
    dept_match: ["재정경제부", "기획재정부", "재경부", "기재부"]
    list_pages: 5
    enabled: true
    keywords_include: []
    keywords_exclude: []

  - id: nts
    name: 국세청
    emoji: "📊"
    type: korea_kr_list
    dept_match: ["국세청"]
    # 저빈도 부처: 최근 100건에도 안 잡힐 때가 있어 더 깊게 훑음.
    list_pages: 8
    enabled: true
    keywords_include: []
    keywords_exclude: []

  - id: molit
    name: 국토교통부
    emoji: "🏗️"
    type: korea_kr_list
    dept_match: ["국토교통부", "국토부"]
    list_pages: 5
    enabled: true
    keywords_include: []
    keywords_exclude: []

  - id: mss
    name: 중소벤처기업부
    emoji: "🚀"
    type: korea_kr_list
    dept_match: ["중소벤처기업부", "중기부"]
    # 저빈도 부처: 최근 100건에도 안 잡힐 때가 있어 더 깊게 훑음.
    list_pages: 8
    enabled: true
    keywords_include: []
    keywords_exclude: []

  # ---------- 기관 홈페이지 직접 RSS (korea.kr에 없을 경우 백업용) ----------
  # 아래는 비활성 상태 기본값. korea_kr_dept가 동작 안 할 때 enabled: true로 전환

  - id: fsc_direct
    name: 금융위원회 (홈페이지)
    emoji: "🏦"
    type: html
    list_url: "https://www.fsc.go.kr/no010101"
    parser: fsc_html
    enabled: false

  - id: fss_direct
    name: 금융감독원 (홈페이지)
    emoji: "🛡️"
    type: html
    list_url: "https://www.fss.or.kr/fss/bbs/B0000188/list.do?menuNo=200218"
    parser: fss_html
    enabled: false

  - id: bok_direct
    name: 한국은행 (홈페이지)
    emoji: "💴"
    type: html
    list_url: "https://www.bok.or.kr/portal/bbs/P0000559/list.do?menuNo=200690"
    parser: bok_html
    enabled: false

  # ---------- 예시: 사용자 지정 URL (소비자원 등) ----------
  # 아래는 주석. 필요할 때 주석 해제하고 parser 구현하면 사용 가능.
  #
  # - id: kca
  #   name: 한국소비자원
  #   emoji: "🛒"
  #   type: html
  #   list_url: "https://www.kca.go.kr/home/sub.do?menukey=4002"
  #   parser: kca_html
  #   enabled: false
